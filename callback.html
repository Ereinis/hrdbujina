<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Authenticating…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #a6c63a;
      --bg: #0b0d08;
      --surface: #111408;
      --border: rgba(166,198,58,0.15);
      --text-primary: #eef2e0;
      --text-muted: #7a8a52;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Instrument Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 20px; text-align:center; padding:24px;
    }
    .spinner {
      width:36px; height:36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius:50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-muted); letter-spacing:1px; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      padding: 20px 28px;
      color: #f87171;
      font-size: 14px;
      line-height: 1.6;
      max-width:400px;
    }
    .back-link {
      font-size: 13px; color: var(--accent);
      text-decoration: none; margin-top: 8px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Verifying your Discord account…</div>

  <script type="module">
    const setStatus = (msg) => { document.getElementById('status').textContent = msg; };

    async function handleCallback() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const token = params.get('access_token');
      const returnedState = params.get('state');
      const storedState = sessionStorage.getItem('oauth_state');

      if (!token) {
        showError('No access token received from Discord. Please try logging in again.');
        return;
      }
      if (returnedState !== storedState) {
        showError('State mismatch — possible CSRF. Please try again.');
        return;
      }

      try {
        setStatus('Loading portal configuration...');
        const { fetchAndValidate, saveSession } = await import('./js/auth.js');
        setStatus('Fetching your guild membership…');
        const session = await fetchAndValidate(token);
        saveSession(session);
        setStatus('Access granted! Redirecting…');
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        if (err.name === 'AbortError') {
          showError('Discord took too long to respond. Refresh and try again.');
        } else if (err.message === 'NO_HR_ROLE') {
          showError('You do not have the <strong>Human Resources</strong> role in the server. Access denied.');
        } else if (err.message === 'NO_RANK_ROLE') {
          showError('No valid HR rank role found on your account. Contact a President or Vice President.');
        } else {
          showError(`Authentication failed: ${err.message}`);
        }
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.body.insertAdjacentHTML('beforeend', `
        <div class="error-box">${msg}</div>
        <a href="index.html" class="back-link">← Back to login</a>
      `);
    }

    handleCallback();
  </script>
</body>
</html>
